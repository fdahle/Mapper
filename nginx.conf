# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name map.fdahle.de;
    return 301 https://$server_name$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name map.fdahle.de;

    # SSL configuration
    include /etc/nginx/snippets/ssl-fdahle.conf;

    # default security headers (no CSP here — handled by the app via Helmet)
    include /etc/nginx/snippets/security-headers.conf;

    # Log settings
    access_log /var/log/nginx/mapmarker_access.log;
    error_log  /var/log/nginx/mapmarker_error.log;

    # Forward real client IP to the app (required for rate limiting)
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        proxy_pass http://localhost:3082;
    }
}
